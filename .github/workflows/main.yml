name: Mobile Pre-Check

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'

jobs:
  check:
    name: Check mobile dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Configure npm network retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm install --legacy-peer-deps && exit 0
            if [ "$attempt" -eq 3 ]; then
              echo "npm install failed after $attempt attempts"
              exit 1
            fi
            echo "npm install failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Check for @trailplanner/shared imports
        run: |
          if grep -r "@trailplanner/shared" app/ lib/ 2>/dev/null; then
            echo "❌ Found imports from @trailplanner/shared"
            exit 1
          else
            echo "✅ No @trailplanner/shared imports found"
          fi

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Expo version check
        run: npx expo install --check
        continue-on-error: true
