name: EAS Update Production

on:
  push:
    tags:
      - 'v*'

jobs:
  update-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.4.0

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Publish production OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch production --environment production --message "Production OTA update ${{ github.ref_name }}" --non-interactive
