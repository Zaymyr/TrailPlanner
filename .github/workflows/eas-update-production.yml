name: EAS Update Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'package-lock.json'
      - '.github/workflows/eas-update-production.yml'
  workflow_dispatch:

jobs:
  update-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.4.0

      - name: Configure npm network retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci --legacy-peer-deps && exit 0
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi
            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Publish production OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas update --branch production --environment production --message "${{ github.event.head_commit.message || 'Production OTA update' }}" --non-interactive
