name: Supabase DB Migrate

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Réconciliation remote/local ──────────────────────────────────────
      # Compare les migrations remote avec les fichiers locaux.
      # Les migrations présentes en remote mais absentes en local sont
      # marquées "applied" pour éviter que le push essaie de les rejouer.
      - name: Sync migration history (repair drift)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "→ Récupération des migrations remote..."

          # Liste les versions remote (format: timestamp | name)
          REMOTE=$(supabase migration list --output json 2>/dev/null \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for m in data:
              if m.get('remote_version') and not m.get('local_path'):
                  print(m['remote_version'])
          " 2>/dev/null || echo "")

          if [ -z "$REMOTE" ]; then
            echo "✅ Aucun drift détecté — migrations remote/local alignées."
          else
            echo "⚠️  Migrations remote sans fichier local détectées :"
            echo "$REMOTE"
            echo "→ Marquage comme 'applied' pour éviter les conflits..."
            for version in $REMOTE; do
              echo "   repair: $version"
              supabase migration repair --status applied "$version"
            done
            echo "✅ Repair terminé."
          fi

      # ── Sessions bloquantes ──────────────────────────────────────────────
      - name: Inspect sessions
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL_SESSION="$SUPABASE_DB_URL_SESSION" \
            postgres:17-alpine \
            sh -lc 'psql "$SUPABASE_DB_URL_SESSION" -c "
              SELECT now(), pid, usename, application_name, state,
                     wait_event_type, wait_event, query
              FROM pg_stat_activity
              WHERE datname = current_database()
              ORDER BY state, usename;
            "'

      - name: Terminate idle-in-transaction sessions
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL_SESSION="$SUPABASE_DB_URL_SESSION" \
            postgres:17-alpine \
            sh -lc 'psql "$SUPABASE_DB_URL_SESSION" -v ON_ERROR_STOP=1 -c "
              SELECT pg_terminate_backend(pid)
              FROM pg_stat_activity
              WHERE datname = current_database()
                AND pid <> pg_backend_pid()
                AND state = '\''idle in transaction'\'';
            "'

      # ── Push des nouvelles migrations ────────────────────────────────────
      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --include-all
