name: Supabase DB Migrate

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Détection et repair dynamique des drifts remote/local ───────────
      # Récupère la liste complète des migrations via `supabase migration list`.
      # Les lignes avec une version remote mais sans fichier local sont des
      # migrations appliquées directement sur Supabase (dashboard, CLI local,
      # etc.) sans passer par Git. On les marque "applied" automatiquement.
      - name: Auto-repair remote-only migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "→ Récupération de la liste des migrations..."
          supabase migration list 2>&1 | tee /tmp/migration_list.txt

          echo ""
          echo "→ Recherche de drifts (remote sans local)..."

          # La sortie de `supabase migration list` a ce format :
          #   LOCAL    │ REMOTE   │ TIME (UTC)
          #   ─────────┼──────────┼──────────────────────
          #            │ 20260322 │ 2026-03-22 ...   ← remote only (drift)
          #   20260323 │ 20260323 │ 2026-03-23 ...   ← OK
          #   20260324 │          │ 2026-03-24 ...   ← local only (pas encore pushé)

          DRIFT_FOUND=0

          while IFS= read -r line; do
            # Extraire colonnes LOCAL et REMOTE (séparateur │)
            LOCAL_VER=$(echo "$line" | awk -F'│' '{gsub(/ /,"",$1); print $1}')
            REMOTE_VER=$(echo "$line" | awk -F'│' '{gsub(/ /,"",$2); print $2}')

            # Si REMOTE a une valeur et LOCAL est vide → drift
            if [[ -n "$REMOTE_VER" && "$REMOTE_VER" =~ ^[0-9]{14}$ && -z "$LOCAL_VER" ]]; then
              echo "⚠️  Drift détecté : $REMOTE_VER est en remote sans fichier local"
              supabase migration repair --status applied "$REMOTE_VER"
              echo "✅ Repair applied: $REMOTE_VER"
              DRIFT_FOUND=1
            fi
          done < /tmp/migration_list.txt

          if [ "$DRIFT_FOUND" -eq 0 ]; then
            echo "✅ Aucun drift détecté — migrations remote/local alignées."
          fi

      # ── Sessions bloquantes ──────────────────────────────────────────────
      - name: Inspect sessions
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL_SESSION="$SUPABASE_DB_URL_SESSION" \
            postgres:17-alpine \
            sh -lc 'psql "$SUPABASE_DB_URL_SESSION" -c "
              SELECT now(), pid, usename, application_name, state,
                     wait_event_type, wait_event, query
              FROM pg_stat_activity
              WHERE datname = current_database()
              ORDER BY state, usename;
            "'

      - name: Terminate idle-in-transaction sessions
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL_SESSION="$SUPABASE_DB_URL_SESSION" \
            postgres:17-alpine \
            sh -lc 'psql "$SUPABASE_DB_URL_SESSION" -v ON_ERROR_STOP=1 -c "
              SELECT pg_terminate_backend(pid)
              FROM pg_stat_activity
              WHERE datname = current_database()
                AND pid <> pg_backend_pid()
                AND state = '\''idle in transaction'\'';
            "'

      # ── Push des nouvelles migrations ────────────────────────────────────
      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --include-all
