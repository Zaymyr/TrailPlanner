name: Supabase DB Migrate

on:
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # ── Détection et repair dynamique des drifts remote/local ───────────
      # Les migrations présentes en remote sans fichier local sont des
      # migrations créées directement sur Supabase (dashboard, CLI local).
      # On les marque "reverted" pour que db push les ignore complètement.
      # Elles resteront en place sur la DB — on dit juste à Supabase CLI
      # de ne plus les considérer comme un conflit.
      - name: Auto-repair remote-only migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "→ Récupération de la liste des migrations..."
          supabase migration list 2>&1 | tee /tmp/migration_list.txt

          echo ""
          echo "→ Recherche de drifts (remote sans local)..."

          DRIFT_FOUND=0

          while IFS='|' read -r local_col remote_col rest; do
            LOCAL_VER=$(echo "$local_col" | tr -d ' ')
            REMOTE_VER=$(echo "$remote_col" | tr -d ' ')

            # Ignorer les lignes d'en-tête et séparateurs
            if [[ ! "$REMOTE_VER" =~ ^[0-9]{14}$ ]]; then
              continue
            fi

            # Si REMOTE est valide et LOCAL est vide → drift
            if [[ -z "$LOCAL_VER" ]]; then
              echo "⚠️  Drift détecté : $REMOTE_VER est en remote sans fichier local"
              supabase migration repair --status reverted "$REMOTE_VER"
              echo "✅ Repair reverted: $REMOTE_VER (la migration reste sur la DB, le conflit est résolu)"
              DRIFT_FOUND=1
            fi
          done < /tmp/migration_list.txt

          if [ "$DRIFT_FOUND" -eq 0 ]; then
            echo "✅ Aucun drift détecté — migrations remote/local alignées."
          else
            echo ""
            echo "→ État après repair :"
            supabase migration list 2>&1
          fi

      # ── Sessions bloquantes ──────────────────────────────────────────────
      - name: Inspect sessions
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL_SESSION="$SUPABASE_DB_URL_SESSION" \
            postgres:17-alpine \
            sh -lc 'psql "$SUPABASE_DB_URL_SESSION" -c "
              SELECT now(), pid, usename, application_name, state,
                     wait_event_type, wait_event, query
              FROM pg_stat_activity
              WHERE datname = current_database()
              ORDER BY state, usename;
            "'

      - name: Terminate idle-in-transaction sessions
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL_SESSION="$SUPABASE_DB_URL_SESSION" \
            postgres:17-alpine \
            sh -lc 'psql "$SUPABASE_DB_URL_SESSION" -v ON_ERROR_STOP=1 -c "
              SELECT pg_terminate_backend(pid)
              FROM pg_stat_activity
              WHERE datname = current_database()
                AND pid <> pg_backend_pid()
                AND state = '\''idle in transaction'\'';
            "'

      # ── Push des nouvelles migrations ────────────────────────────────────
      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --include-all
