name: EAS Update Preview

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'package-lock.json'
      - '.github/workflows/eas-update-preview.yml'

jobs:
  update-preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Publish preview OTA update
        run: eas update --branch preview --message "${{ github.event.head_commit.message || 'Preview OTA update' }}" --non-interactive
