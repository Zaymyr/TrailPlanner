name: Mobile Changelog Snapshot

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mobile-changelog-snapshot.yml'

permissions:
  contents: read

jobs:
  snapshot:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read mobile app version
        id: app_version
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const content = fs.readFileSync('apps/mobile/app.config.ts', 'utf8');
          const match = content.match(/version:\s*'([^']+)'/);

          if (!match) {
            throw new Error('Unable to read apps/mobile/app.config.ts version');
          }

          console.log(`value=${match[1]}`);
          NODE

      - name: Prepare changelog payload
        id: payload
        shell: bash
        env:
          APP_VERSION: ${{ steps.app_version.outputs.value }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_BEFORE: ${{ github.event.before }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          describe_path() {
            case "$1" in
              apps/mobile/app/*)
                printf 'Mobile screen updated: %s\n' "$(basename "$1")"
                ;;
              apps/mobile/components/*)
                printf 'Mobile component updated: %s\n' "$(basename "$1")"
                ;;
              apps/mobile/hooks/*)
                printf 'Mobile logic updated: %s\n' "$(basename "$1")"
                ;;
              apps/mobile/lib/*)
                printf 'Mobile service updated: %s\n' "$(basename "$1")"
                ;;
              apps/web/app/*)
                printf 'Web flow updated: %s\n' "${1#apps/web/app/}"
                ;;
              apps/web/lib/*)
                printf 'Web logic updated: %s\n' "$(basename "$1")"
                ;;
              supabase/migrations/*)
                printf 'Database migration added: %s\n' "$(basename "$1")"
                ;;
              .github/workflows/*)
                printf 'Automation updated: %s\n' "$(basename "$1")"
                ;;
              packages/*)
                printf 'Shared package updated: %s\n' "${1#packages/}"
                ;;
              package.json|package-lock.json|apps/mobile/package-lock.json)
                printf 'Dependencies updated\n'
                ;;
              *)
                printf 'Updated: %s\n' "$(basename "$1")"
                ;;
            esac
          }

          short_sha="${COMMIT_SHA::7}"
          first_line="$(printf '%s' "$COMMIT_MESSAGE" | head -n 1 | tr '\r' ' ' | sed 's/[[:space:]]\+/ /g')"

          if [ -z "$first_line" ]; then
            first_line="Mobile snapshot $short_sha"
          fi

          snapshot_version="${APP_VERSION}+${short_sha}"
          summary_lines="$(printf '%s\n' "$COMMIT_MESSAGE" | awk 'BEGIN {capture=0} tolower($0) ~ /^summary:[[:space:]]*$/ {capture=1; next} capture {print}')"

          detail_lines=""

          if [ -n "$(printf '%s' "$summary_lines" | tr -d '[:space:]')" ]; then
            while IFS= read -r line; do
              normalized="$(printf '%s' "$line" | sed 's/^[[:space:]]*[-*]\{0,1\}[[:space:]]*//; s/[[:space:]]\+/ /g; s/^ //; s/ $//')"
              if [ -n "$normalized" ]; then
                detail_lines="${detail_lines}- ${normalized}"$'\n'
              fi
            done <<< "$summary_lines"
          else
            diff_base="$COMMIT_BEFORE"

            if [ -z "$diff_base" ] || [ "$diff_base" = "0000000000000000000000000000000000000000" ]; then
              diff_base="$(git rev-list --max-count=1 "${COMMIT_SHA}^" 2>/dev/null || true)"
            fi

            if [ -n "$diff_base" ] && ! git cat-file -e "$diff_base^{commit}" 2>/dev/null; then
              diff_base="$(git rev-list --max-count=1 "${COMMIT_SHA}^" 2>/dev/null || true)"
            fi

            if [ -n "$diff_base" ]; then
              while IFS= read -r path; do
                [ -n "$path" ] || continue
                detail_lines="${detail_lines}- $(describe_path "$path")"$'\n'
              done < <(git diff --name-only "$diff_base" "$COMMIT_SHA" | head -n 5)
            fi

            if [ -z "$detail_lines" ]; then
              detail_lines="- Automatic mobile snapshot generated"$'\n'
            fi
          fi

          {
            echo "short_sha=$short_sha"
            echo "title=$first_line"
            echo "version=$snapshot_version"
            echo "detail<<EOF"
            printf '%s' "$detail_lines"
            printf -- "- Snapshot: %s (%s)\n" "$short_sha" "$REF_NAME"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Insert changelog snapshot
        env:
          SUPABASE_DB_URL_SESSION: ${{ secrets.SUPABASE_DB_URL_SESSION }}
          CHANGELOG_VERSION: ${{ steps.payload.outputs.version }}
          CHANGELOG_TITLE: ${{ steps.payload.outputs.title }}
          CHANGELOG_DETAIL: ${{ steps.payload.outputs.detail }}
        shell: bash
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL_SESSION="$SUPABASE_DB_URL_SESSION" \
            -e CHANGELOG_VERSION="$CHANGELOG_VERSION" \
            -e CHANGELOG_TITLE="$CHANGELOG_TITLE" \
            -e CHANGELOG_DETAIL="$CHANGELOG_DETAIL" \
            postgres:17-alpine \
            sh -lc '
              echo "Connected as: $(psql "$SUPABASE_DB_URL_SESSION" -tAc "select current_user;")"
              echo "Database: $(psql "$SUPABASE_DB_URL_SESSION" -tAc "select current_database();")"
              VERSION_SQL=$(printf "%s" "$CHANGELOG_VERSION" | sed "s/'"'"'/'"'"''"'"'/g")
              TITLE_SQL=$(printf "%s" "$CHANGELOG_TITLE" | sed "s/'"'"'/'"'"''"'"'/g")
              DETAIL_SQL=$(printf "%s" "$CHANGELOG_DETAIL" | sed "s/'"'"'/'"'"''"'"'/g")

              psql "$SUPABASE_DB_URL_SESSION" \
                -v ON_ERROR_STOP=1 \
                -c "insert into public.app_changelog (version, title, detail, published_at) values ('"'$VERSION_SQL'"', '"'$TITLE_SQL'"', '"'$DETAIL_SQL'"', timezone('"'utc'"', now())) on conflict (version) do update set title = excluded.title, detail = excluded.detail, published_at = excluded.published_at, is_published = true;"
            '
