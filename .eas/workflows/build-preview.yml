name: Build Android Preview

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/package.json'
      - 'apps/mobile/app.config.ts'
      - 'apps/mobile/eas.json'

jobs:
  build:
    name: Build Android preview
    type: build
    params:
      platform: android
      profile: preview
