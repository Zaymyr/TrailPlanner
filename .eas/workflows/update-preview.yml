name: EAS Update Preview

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'

jobs:
  update-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish preview update
        run: npx eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
