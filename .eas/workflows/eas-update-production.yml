name: EAS Update Production

on:
  push:
    tags:
      - 'v*'

jobs:
  update-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish production update
        working-directory: apps/mobile
        run: npx eas update --branch production --message "Production update ${{ github.ref_name }}" --non-interactive
